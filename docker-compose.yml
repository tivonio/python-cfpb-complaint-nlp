services:
  db:
    image: postgres:18
    container_name: pg-cfpb-nlp
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cfpb_nlp
    volumes:
      - pg_cfpb_nlp_data:/var/lib/postgresql
      - ./data/raw:/data/raw:ro

volumes:
  pg_cfpb_nlp_data: